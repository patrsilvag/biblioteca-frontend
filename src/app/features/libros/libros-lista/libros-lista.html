<div class="card shadow">
  <div class="card-header bg-white py-3">
    <h5 class="mb-0 text-primary fw-bold">Catálogo de Libros Informáticos</h5>
  </div>
  
  <div class="card-body p-0">
    <div class="tabla-container">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th class="ps-3">ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Año</th>
            <th>Género</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let libro of libros">
            <td class="ps-3 text-muted">#{{ libro.id }}</td>
            <td class="fw-bold text-dark">{{ libro.titulo }}</td>
            <td>{{ libro.autor }}</td>
            <td>
              <span class="badge rounded-pill bg-light text-dark border">
                {{ libro.anioPublicacion }}
              </span>
            </td>
            <td>
              <span class="badge bg-info-subtle text-info-emphasis border border-info-subtle">
                {{ libro.genero }}
              </span>
            </td>
            <td class="text-center">
              <div class="btn-group btn-group-sm">
                <a [routerLink]="['/libros/editar', libro.id]" 
                   class="btn btn-outline-primary" 
                   title="Editar libro">
                   Editar
                </a>
                <button (click)="eliminar(libro.id!)" 
                        class="btn btn-outline-danger" 
                        title="Eliminar libro">
                   Eliminar
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="libros.length === 0">
            <td colspan="6" class="text-center py-4 text-muted">
              No hay libros disponibles en la biblioteca.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
